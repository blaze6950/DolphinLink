<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DolphinLink</title>
    <base href="/" />
    <!-- GitHub Pages SPA redirect restore.
         If 404.html encoded a deep-link into ?p=, restore the real URL via
         history.replaceState() before Blazor's router initialises so the
         router sees the correct path rather than the root with a query string. -->
    <script>
        (function () {
            var search = window.location.search;
            if (search.slice(1, 3) === 'p=') {
                var decoded = search.slice(1)
                    .split('&')
                    .reduce(function (prev, item) {
                        return (item.slice(0, 2) === 'p=')
                            ? prev + '/' + item.slice(2).replace(/~and~/g, '&')
                            : prev + (item.slice(0, 2) === 'q='
                                ? '?' + item.slice(2).replace(/~and~/g, '&')
                                : '&' + item);
                    }, '');
                window.history.replaceState(null, null,
                    window.location.pathname.slice(0, -1) + decoded + window.location.hash);
            }
        })();
    </script>
    <!-- theme.js must run before any stylesheet so data-theme is set on <html>
         before CSS variables are evaluated — prevents a flash of wrong theme. -->
    <script src="theme.js"></script>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="DolphinLink.Web.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.scrollToId = function (id) {
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
    </script>
</body>

</html>
